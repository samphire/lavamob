<script>
    // --- central login gate ---
    async function checkLogin() {
        fetch('/login/whoami_lavamob.php', {credentials: 'include', cache: 'no-store'})
            .then(r => r.json())
            .then(d => {
                if (!d || !d.ok) {
// Not logged in → go to central login
                    const next = location.pathname + location.search + location.hash;
                    location.href = '/login/?next=' + encodeURIComponent(next);
                    return;
                }
            });
    }

    checkLogin();
    window.addEventListener('pageshow', function (event) {
        if (event.persisted) {
            checkLogin();
        }
    });
</script>


<button id="installBtn" style="display:none;">
    Install Lavamob App
</button>

<div id="iosInstallMsg" style="display:none;">
    On iPhone or iPad: tap the Share button, then choose
    <strong>Add to Home Screen</strong>.
</div>

<script>
    let deferredPrompt;

    const installBtn = document.getElementById("installBtn");
    const iosMsg = document.getElementById("iosInstallMsg");

    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("service-worker.js", {
                scope: "./"
            })
                .then(reg => {
                    console.log("Service worker registered:", reg.scope);
                })
                .catch(err => {
                    console.error("Service worker registration failed:", err);
                });
        });
    }

    window.addEventListener("beforeinstallprompt", (e) => {
        console.log("beforeinstallprompt fired");
        e.preventDefault();

        deferredPrompt = e;
        installBtn.style.display = "inline-block";
    });

    setTimeout(() => {
        if (!deferredPrompt) {
            document.getElementById("androidAlt").style.display = "none";
        }
    }, 3000);

    installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;

        deferredPrompt.prompt();

        const choice = await deferredPrompt.userChoice;
        console.log("Install choice:", choice.outcome);

        deferredPrompt = null;
        installBtn.style.display = "none";
    });

    window.addEventListener("appinstalled", () => {
        console.log("PWA installed");
        deferredPrompt = null;
        installBtn.style.display = "none";
    });

    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);

    const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;

    if (isIos && !isStandalone) {
        iosMsg.style.display = "block";
    }

    if (isStandalone) {
        // Hide ALL install-related UI
        document.getElementById("installBtn").style.display = "none";
        document.getElementById("androidAlt").style.display = "none";
        document.getElementById("iosInstallMsg").style.display = "none";
    }

    const isSamsung = /samsung/i.test(navigator.userAgent);

    if (isSamsung && isStandalone) {
        // Force-hide install UI on Samsung when already installed
        document.getElementById("installBtn").style.display = "none";
        document.getElementById("androidAlt").style.display = "none";
    }

</script>
